name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Determine release type
        id: release_type
        run: |
          CURRENT=${GITHUB_REF#refs/tags/}
          CURRENT=${CURRENT#v}

          PREV_TAG=$(git tag --sort=-version:refname | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')

          if [ -z "$PREV_TAG" ]; then
            BUMP=patch
          else
            PREV=${PREV_TAG#v}
            C_MAJ=$(echo "$CURRENT" | cut -d. -f1)
            C_MIN=$(echo "$CURRENT" | cut -d. -f2)
            P_MAJ=$(echo "$PREV"    | cut -d. -f1)
            P_MIN=$(echo "$PREV"    | cut -d. -f2)

            if [ "$C_MAJ" != "$P_MAJ" ]; then
              BUMP=major
            elif [ "$C_MIN" != "$P_MIN" ]; then
              BUMP=minor
            else
              BUMP=patch
            fi
          fi

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Release type: $BUMP ($CURRENT vs ${PREV_TAG:-none})"

      - name: Set package version
        run: npm version ${{ steps.release_type.outputs.version }} --no-git-tag-version

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Publish (${{ steps.release_type.outputs.bump }})
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
